<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 880" font-family="monospace, Arial" font-size="13">

  <!-- Background -->
  <rect width="1000" height="880" fill="#0f1117"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold" letter-spacing="2">SSH TUNNELS — Schéma explicatif</text>
  <line x1="40" y1="48" x2="960" y2="48" stroke="#444" stroke-width="1"/>

  <!-- ===================== LÉGENDE ===================== -->
  <rect x="40" y="58" width="940" height="110" rx="8" fill="#1a1d2e" stroke="#333" stroke-width="1"/>

  <text x="60" y="78" fill="#ffffff" font-size="12" font-weight="bold" letter-spacing="1">LÉGENDE</text>
  <line x1="60" y1="83" x2="960" y2="83" stroke="#333" stroke-width="1"/>

  <!-- Ligne 1 : Tunnel SSH -->
  <line x1="70" y1="100" x2="110" y2="100" stroke="#00e5ff" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="108,96 120,100 108,104" fill="#00e5ff"/>
  <text x="128" y="104" fill="#cccccc" font-size="12">Tunnel SSH chiffré (toujours initié par la machine locale)</text>

  <!-- Ligne 2 : Flux applicatif -->
  <line x1="70" y1="122" x2="110" y2="122" stroke="#ffeb3b" stroke-width="2"/>
  <polygon points="108,118 120,122 108,126" fill="#ffeb3b"/>
  <text x="128" y="126" fill="#cccccc" font-size="12">Flux de données applicatif (sens variable selon le cas)</text>

  <!-- Ligne 3 : Blocs -->
  <rect x="70" y="140" width="16" height="16" rx="3" fill="#1e3a5f" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="94" y="153" fill="#cccccc" font-size="12">Machine Locale</text>

  <rect x="250" y="140" width="16" height="16" rx="3" fill="#1a3d2b" stroke="#4caf50" stroke-width="1.5"/>
  <text x="274" y="153" fill="#cccccc" font-size="12">Serveur SSH (relais)</text>

  <rect x="470" y="140" width="16" height="16" rx="3" fill="#3d1a1a" stroke="#ef5350" stroke-width="1.5"/>
  <text x="494" y="153" fill="#cccccc" font-size="12">Cible / Client distant</text>

  <rect x="700" y="140" width="16" height="16" rx="3" fill="#222222" stroke="#666666" stroke-width="1.5"/>
  <text x="724" y="153" fill="#cccccc" font-size="12">Internet</text>

  <!-- ===================== CAS 1 : DYNAMIQUE ===================== -->
  <rect x="40" y="182" width="940" height="185" rx="10" fill="#13161f" stroke="#00bcd4" stroke-width="1.5"/>
  <rect x="40" y="182" width="940" height="32" rx="10" fill="#003544"/>
  <rect x="40" y="200" width="940" height="14" fill="#003544"/>
  <text x="60" y="204" fill="#00e5ff" font-size="15" font-weight="bold">① DYNAMIQUE</text>
  <text x="195" y="204" fill="#555" font-size="13">— ssh -D [port_local] utilisateur@serveur</text>
  <text x="810" y="204" fill="#0097a7" font-size="12">Proxy SOCKS5</text>

  <text x="60" y="233" fill="#888" font-size="12">La machine locale expose un proxy SOCKS. Le client choisit la destination pour chaque requête. Idéal pour naviguer via un proxy.</text>

  <!-- Machine Locale -->
  <rect x="55" y="248" width="220" height="90" rx="8" fill="#1e3a5f" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="165" y="267" text-anchor="middle" fill="#00e5ff" font-size="12" font-weight="bold">Machine Locale</text>
  <text x="165" y="283" text-anchor="middle" fill="#aaa" font-size="11">127.0.0.1</text>
  <text x="165" y="299" text-anchor="middle" fill="#ffeb3b" font-size="11">SOCKS :1080</text>
  <text x="165" y="315" text-anchor="middle" fill="#888" font-size="10">ssh -D 1080 ...</text>

  <!-- Flèche local -> SSH -->
  <line x1="275" y1="293" x2="353" y2="293" stroke="#00e5ff" stroke-width="2" stroke-dasharray="7,3"/>
  <polygon points="351,288 365,293 351,298" fill="#00e5ff"/>
  <text x="314" y="284" text-anchor="middle" fill="#00e5ff" font-size="10">tunnel SSH</text>

  <!-- Serveur SSH -->
  <rect x="365" y="248" width="220" height="90" rx="8" fill="#1a3d2b" stroke="#4caf50" stroke-width="1.5"/>
  <text x="475" y="267" text-anchor="middle" fill="#4caf50" font-size="12" font-weight="bold">Serveur SSH</text>
  <text x="475" y="283" text-anchor="middle" fill="#aaa" font-size="11">ssh.exemple.com</text>
  <text x="475" y="299" text-anchor="middle" fill="#aaa" font-size="11">Port 22</text>
  <text x="475" y="315" text-anchor="middle" fill="#888" font-size="10">Nœud de sortie proxy</text>

  <!-- Flèche SSH -> Internet -->
  <line x1="585" y1="293" x2="647" y2="293" stroke="#ffeb3b" stroke-width="2"/>
  <polygon points="646,288 660,293 646,298" fill="#ffeb3b"/>
  <text x="614" y="284" text-anchor="middle" fill="#ffeb3b" font-size="10">requêtes</text>

  <!-- Internet -->
  <ellipse cx="705" cy="293" rx="44" ry="24" fill="#222" stroke="#666" stroke-width="1.5"/>
  <text x="705" y="290" text-anchor="middle" fill="#aaa" font-size="14">🌐</text>
  <text x="705" y="305" text-anchor="middle" fill="#888" font-size="11">Internet</text>

  <!-- Flèches Internet -> Sites -->
  <line x1="746" y1="283" x2="797" y2="268" stroke="#ffeb3b" stroke-width="1.5"/>
  <polygon points="794,263 807,268 794,273" fill="#ffeb3b"/>
  <line x1="746" y1="303" x2="797" y2="318" stroke="#ffeb3b" stroke-width="1.5"/>
  <polygon points="794,313 807,318 794,323" fill="#ffeb3b"/>

  <!-- Sites distants -->
  <rect x="807" y="252" width="155" height="30" rx="6" fill="#3d1a1a" stroke="#ef5350" stroke-width="1"/>
  <text x="886" y="272" text-anchor="middle" fill="#ef5350" font-size="11">site-A.com :443</text>
  <rect x="807" y="298" width="155" height="30" rx="6" fill="#3d1a1a" stroke="#ef5350" stroke-width="1"/>
  <text x="886" y="318" text-anchor="middle" fill="#ef5350" font-size="11">site-B.com :80</text>
  <text x="886" y="346" text-anchor="middle" fill="#555" font-size="10">destinations dynamiques</text>

  <!-- ===================== CAS 2 : LOCAL ===================== -->
  <rect x="40" y="382" width="940" height="210" rx="10" fill="#13161f" stroke="#8bc34a" stroke-width="1.5"/>
  <rect x="40" y="382" width="940" height="32" rx="10" fill="#1a2d00"/>
  <rect x="40" y="400" width="940" height="14" fill="#1a2d00"/>
  <text x="60" y="404" fill="#8bc34a" font-size="15" font-weight="bold">② LOCAL</text>
  <text x="145" y="404" fill="#555" font-size="13">— ssh -L [port_local]:[cible]:[port_cible] utilisateur@serveur</text>
  <text x="800" y="404" fill="#558b2f" font-size="12">Redirection de port</text>

  <text x="60" y="433" fill="#888" font-size="12">Un port local est redirigé vers une ressource distante via le serveur SSH. Vous accédez à un service distant comme s'il était local.</text>
  <text x="500" y="453" text-anchor="middle" fill="#777" font-size="11" font-style="italic">Exemple : accéder à une BDD distante comme si elle tournait en local</text>

  <!-- Machine Locale -->
  <rect x="55" y="464" width="240" height="100" rx="8" fill="#1e3a5f" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="175" y="483" text-anchor="middle" fill="#00e5ff" font-size="12" font-weight="bold">Machine Locale</text>
  <text x="175" y="499" text-anchor="middle" fill="#aaa" font-size="11">127.0.0.1</text>
  <text x="175" y="515" text-anchor="middle" fill="#ffeb3b" font-size="12" font-weight="bold">:5432 (port local)</text>
  <text x="175" y="531" text-anchor="middle" fill="#888" font-size="10">ssh -L 5432:bdd:5432 ...</text>
  <text x="175" y="547" text-anchor="middle" fill="#aaa" font-size="10">① App → localhost:5432</text>

  <!-- Serveur SSH -->
  <rect x="385" y="464" width="240" height="100" rx="8" fill="#1a3d2b" stroke="#4caf50" stroke-width="1.5"/>
  <text x="505" y="483" text-anchor="middle" fill="#4caf50" font-size="12" font-weight="bold">Serveur SSH</text>
  <text x="505" y="499" text-anchor="middle" fill="#aaa" font-size="11">ssh.exemple.com</text>
  <text x="505" y="515" text-anchor="middle" fill="#aaa" font-size="11">Port 22</text>
  <text x="505" y="531" text-anchor="middle" fill="#888" font-size="10">redirige vers bdd:5432</text>

  <!-- Flèche local -> SSH -->
  <line x1="295" y1="514" x2="373" y2="514" stroke="#00e5ff" stroke-width="2.5" stroke-dasharray="7,3"/>
  <polygon points="371,509 385,514 371,519" fill="#00e5ff"/>
  <text x="334" y="505" text-anchor="middle" fill="#00e5ff" font-size="10">② tunnel SSH chiffré</text>

  <!-- Serveur cible -->       
  <rect x="705" y="464" width="255" height="100" rx="8" fill="#3d1a1a" stroke="#ef5350" stroke-width="1.5"/>
  <text x="832" y="483" text-anchor="middle" fill="#ef5350" font-size="12" font-weight="bold">Serveur BDD distant</text>
  <text x="832" y="499" text-anchor="middle" fill="#aaa" font-size="11">192.168.1.50</text>
  <text x="832" y="515" text-anchor="middle" fill="#ffeb3b" font-size="12" font-weight="bold">:5432 (PostgreSQL)</text>
  <text x="832" y="531" text-anchor="middle" fill="#888" font-size="10">non accessible directement</text>

  <!-- Flèche SSH -> Cible -->
  <line x1="625" y1="514" x2="693" y2="514" stroke="#ffeb3b" stroke-width="2"/>
  <polygon points="691,509 705,514 691,519" fill="#ffeb3b"/>
  <text x="659" y="505" text-anchor="middle" fill="#ffeb3b" font-size="10">③ connexion réseau</text>

  <!-- ===================== CAS 3 : REMOTE ===================== -->
  <rect x="40" y="608" width="940" height="220" rx="10" fill="#13161f" stroke="#ff9800" stroke-width="1.5"/>
  <rect x="40" y="608" width="940" height="32" rx="10" fill="#2d1800"/>
  <rect x="40" y="626" width="940" height="14" fill="#2d1800"/>
  <text x="60" y="630" fill="#ff9800" font-size="15" font-weight="bold">③ REMOTE</text>
  <text x="160" y="630" fill="#555" font-size="13">— ssh -R [port_distant]:[cible_locale]:[port_local] utilisateur@serveur</text>
  <text x="800" y="630" fill="#e65100" font-size="12">Tunnel Inverse</text>

  <text x="60" y="659" fill="#888" font-size="12">La machine locale initie le tunnel SSH vers le serveur. Le serveur expose un port distant qui redirige vers un service local.</text>
  <text x="500" y="679" text-anchor="middle" fill="#777" font-size="11" font-style="italic">Exemple : exposer un serveur web local (port 8080) accessible depuis le serveur SSH (port 9090)</text>

  <!-- Machine Locale -->
  <rect x="55" y="690" width="240" height="110" rx="8" fill="#1e3a5f" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="175" y="709" text-anchor="middle" fill="#00e5ff" font-size="12" font-weight="bold">Machine Locale</text>
  <text x="175" y="725" text-anchor="middle" fill="#aaa" font-size="11">127.0.0.1</text>
  <text x="175" y="741" text-anchor="middle" fill="#ffeb3b" font-size="12" font-weight="bold">:8080 (serveur web local)</text>
  <text x="175" y="757" text-anchor="middle" fill="#888" font-size="10">ssh -R 9090:localhost:8080 ...</text>
  <text x="175" y="773" text-anchor="middle" fill="#aaa" font-size="10">① initie le tunnel SSH</text>

  <!-- Serveur SSH -->
  <rect x="385" y="690" width="240" height="110" rx="8" fill="#1a3d2b" stroke="#4caf50" stroke-width="1.5"/>
  <text x="505" y="709" text-anchor="middle" fill="#4caf50" font-size="12" font-weight="bold">Serveur SSH</text>
  <text x="505" y="725" text-anchor="middle" fill="#aaa" font-size="11">ssh.exemple.com</text>
  <text x="505" y="741" text-anchor="middle" fill="#ffeb3b" font-size="12" font-weight="bold">:9090 (port exposé)</text>
  <text x="505" y="757" text-anchor="middle" fill="#888" font-size="10">redirige vers local:8080</text>
  <text x="505" y="773" text-anchor="middle" fill="#aaa" font-size="10">③ reçoit la connexion entrante</text>

  <!-- Flèche local -> Serveur SSH -->
  <line x1="295" y1="745" x2="373" y2="745" stroke="#00e5ff" stroke-width="2.5" stroke-dasharray="7,3"/>
  <polygon points="371,740 385,745 371,750" fill="#00e5ff"/>
  <text x="334" y="736" text-anchor="middle" fill="#00e5ff" font-size="10">② tunnel SSH chiffré</text>

  <!-- Client Distant -->
  <rect x="705" y="690" width="255" height="110" rx="8" fill="#3d1a1a" stroke="#ef5350" stroke-width="1.5"/>
  <text x="832" y="709" text-anchor="middle" fill="#ef5350" font-size="12" font-weight="bold">Client Distant</text>
  <text x="832" y="725" text-anchor="middle" fill="#aaa" font-size="11">203.0.113.10</text>
  <text x="832" y="741" text-anchor="middle" fill="#ffeb3b" font-size="11" font-weight="bold">→ ssh.exemple.com:9090</text>
  <text x="832" y="757" text-anchor="middle" fill="#888" font-size="10">accède au service local à distance</text>
  <text x="832" y="773" text-anchor="middle" fill="#888" font-size="10">④ se connecte au port 9090</text>

  <!-- Flèche Client Distant -> Serveur SSH -->
  <line x1="635" y1="745" x2="704" y2="745" stroke="#ffeb3b" stroke-width="2"/>
  <polygon points="639,740 625,745 639,750" fill="#ffeb3b"/>
  <text x="664" y="736" text-anchor="middle" fill="#ffeb3b" font-size="10">④ flux applicatif entrant</text>

  <!-- Note résumé Remote -->
  <text x="500" y="817" text-anchor="middle" fill="#ff9800" font-size="11">⚠ Le tunnel SSH est toujours initié par la machine LOCALE → le client distant consomme le service via le port exposé sur le serveur SSH</text>

  <!-- Footer -->
  <line x1="40" y1="858" x2="960" y2="858" stroke="#333" stroke-width="1"/>
  <text x="500" y="872" text-anchor="middle" fill="#444" font-size="11">SSH Tunnels — Dynamic · Local · Remote</text>

</svg>
