<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 880" font-family="monospace, Arial" font-size="13">

  <!-- Background -->
  <rect width="1000" height="880" fill="#0f1117"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold" letter-spacing="2">SSH TUNNELS — Explanatory Diagram</text>
  <line x1="40" y1="48" x2="960" y2="48" stroke="#444" stroke-width="1"/>

  <!-- ===================== LEGEND ===================== -->
  <rect x="40" y="58" width="940" height="110" rx="8" fill="#1a1d2e" stroke="#333" stroke-width="1"/>

  <text x="60" y="78" fill="#ffffff" font-size="12" font-weight="bold" letter-spacing="1">LEGEND</text>
  <line x1="60" y1="83" x2="960" y2="83" stroke="#333" stroke-width="1"/>

  <!-- Line 1 : SSH tunnel -->
  <line x1="70" y1="100" x2="110" y2="100" stroke="#00e5ff" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="108,96 120,100 108,104" fill="#00e5ff"/>
  <text x="128" y="104" fill="#cccccc" font-size="12">Encrypted SSH tunnel (always initiated by the local machine)</text>

  <!-- Line 2 : Application flow -->
  <line x1="70" y1="122" x2="110" y2="122" stroke="#ffeb3b" stroke-width="2"/>
  <polygon points="108,118 120,122 108,126" fill="#ffeb3b"/>
  <text x="128" y="126" fill="#cccccc" font-size="12">Application data flow (direction varies per case)</text>

  <!-- Line 3 : Blocks -->
  <rect x="70" y="140" width="16" height="16" rx="3" fill="#1e3a5f" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="94" y="153" fill="#cccccc" font-size="12">Local Machine</text>

  <rect x="240" y="140" width="16" height="16" rx="3" fill="#1a3d2b" stroke="#4caf50" stroke-width="1.5"/>
  <text x="264" y="153" fill="#cccccc" font-size="12">SSH Server (relay)</text>

  <rect x="450" y="140" width="16" height="16" rx="3" fill="#3d1a1a" stroke="#ef5350" stroke-width="1.5"/>
  <text x="474" y="153" fill="#cccccc" font-size="12">Target / Remote Client</text>

  <rect x="690" y="140" width="16" height="16" rx="3" fill="#222222" stroke="#666666" stroke-width="1.5"/>
  <text x="714" y="153" fill="#cccccc" font-size="12">Internet</text>

  <!-- ===================== CASE 1 : DYNAMIC ===================== -->
  <rect x="40" y="182" width="940" height="185" rx="10" fill="#13161f" stroke="#00bcd4" stroke-width="1.5"/>
  <rect x="40" y="182" width="940" height="32" rx="10" fill="#003544"/>
  <rect x="40" y="200" width="940" height="14" fill="#003544"/>
  <text x="60" y="204" fill="#00e5ff" font-size="15" font-weight="bold">① DYNAMIC</text>
  <text x="190" y="204" fill="#555" font-size="13">— ssh -D [local_port] user@server</text>
  <text x="820" y="204" fill="#0097a7" font-size="12">SOCKS5 Proxy</text>

  <text x="60" y="233" fill="#888" font-size="12">The local machine exposes a SOCKS proxy. The client chooses the destination for each request. Ideal for browsing through a proxy.</text>

  <!-- Local Machine -->
  <rect x="55" y="248" width="220" height="90" rx="8" fill="#1e3a5f" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="165" y="267" text-anchor="middle" fill="#00e5ff" font-size="12" font-weight="bold">Local Machine</text>
  <text x="165" y="283" text-anchor="middle" fill="#aaa" font-size="11">127.0.0.1</text>
  <text x="165" y="299" text-anchor="middle" fill="#ffeb3b" font-size="11">SOCKS :1080</text>
  <text x="165" y="315" text-anchor="middle" fill="#888" font-size="10">ssh -D 1080 ...</text>

  <!-- Arrow local -> SSH -->
  <line x1="275" y1="293" x2="353" y2="293" stroke="#00e5ff" stroke-width="2" stroke-dasharray="7,3"/>
  <polygon points="351,288 365,293 351,298" fill="#00e5ff"/>
  <text x="314" y="284" text-anchor="middle" fill="#00e5ff" font-size="10">SSH tunnel</text>

  <!-- SSH Server -->
  <rect x="365" y="248" width="220" height="90" rx="8" fill="#1a3d2b" stroke="#4caf50" stroke-width="1.5"/>
  <text x="475" y="267" text-anchor="middle" fill="#4caf50" font-size="12" font-weight="bold">SSH Server</text>
  <text x="475" y="283" text-anchor="middle" fill="#aaa" font-size="11">ssh.example.com</text>
  <text x="475" y="299" text-anchor="middle" fill="#aaa" font-size="11">Port 22</text>
  <text x="475" y="315" text-anchor="middle" fill="#888" font-size="10">Acts as proxy exit node</text>

  <!-- Arrow SSH -> Internet -->
  <line x1="585" y1="293" x2="647" y2="293" stroke="#ffeb3b" stroke-width="2"/>
  <polygon points="646,288 660,293 646,298" fill="#ffeb3b"/>
  <text x="614" y="284" text-anchor="middle" fill="#ffeb3b" font-size="10">requests</text>

  <!-- Internet -->
  <ellipse cx="705" cy="293" rx="44" ry="24" fill="#222" stroke="#666" stroke-width="1.5"/>
  <text x="705" y="290" text-anchor="middle" fill="#aaa" font-size="14">🌐</text>
  <text x="705" y="305" text-anchor="middle" fill="#888" font-size="11">Internet</text>

  <!-- Arrow Internet -> Sites -->
  <line x1="746" y1="283" x2="797" y2="268" stroke="#ffeb3b" stroke-width="1.5"/>
  <polygon points="794,263 807,268 794,273" fill="#ffeb3b"/>
  <line x1="746" y1="303" x2="797" y2="318" stroke="#ffeb3b" stroke-width="1.5"/>
  <polygon points="794,313 807,318 794,323" fill="#ffeb3b"/>

  <!-- Remote Sites -->
  <rect x="807" y="252" width="155" height="30" rx="6" fill="#3d1a1a" stroke="#ef5350" stroke-width="1"/>
  <text x="886" y="272" text-anchor="middle" fill="#ef5350" font-size="11">site-A.com :443</text>
  <rect x="807" y="298" width="155" height="30" rx="6" fill="#3d1a1a" stroke="#ef5350" stroke-width="1"/>
  <text x="886" y="318" text-anchor="middle" fill="#ef5350" font-size="11">site-B.com :80</text>
  <text x="886" y="346" text-anchor="middle" fill="#555" font-size="10">dynamic destinations</text>

  <!-- ===================== CASE 2 : LOCAL ===================== -->
  <rect x="40" y="382" width="940" height="210" rx="10" fill="#13161f" stroke="#8bc34a" stroke-width="1.5"/>
  <rect x="40" y="382" width="940" height="32" rx="10" fill="#1a2d00"/>
  <rect x="40" y="400" width="940" height="14" fill="#1a2d00"/>
  <text x="60" y="404" fill="#8bc34a" font-size="15" font-weight="bold">② LOCAL</text>
  <text x="145" y="404" fill="#555" font-size="13">— ssh -L [local_port]:[target]:[target_port] user@server</text>
  <text x="800" y="404" fill="#558b2f" font-size="12">Port Forwarding</text>

  <text x="60" y="433" fill="#888" font-size="12">A local port is forwarded to a remote resource through the SSH server. You access a remote service as if it were local.</text>
  <text x="500" y="453" text-anchor="middle" fill="#777" font-size="11" font-style="italic">Example: access a remote DB as if it were running locally</text>

  <!-- Local Machine -->
  <rect x="55" y="464" width="240" height="100" rx="8" fill="#1e3a5f" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="175" y="483" text-anchor="middle" fill="#00e5ff" font-size="12" font-weight="bold">Local Machine</text>
  <text x="175" y="499" text-anchor="middle" fill="#aaa" font-size="11">127.0.0.1</text>
  <text x="175" y="515" text-anchor="middle" fill="#ffeb3b" font-size="12" font-weight="bold">:5432 (local port)</text>
  <text x="175" y="531" text-anchor="middle" fill="#888" font-size="10">ssh -L 5432:db:5432 ...</text>
  <text x="175" y="547" text-anchor="middle" fill="#aaa" font-size="10">① App → localhost:5432</text>

  <!-- SSH Server -->
  <rect x="385" y="464" width="240" height="100" rx="8" fill="#1a3d2b" stroke="#4caf50" stroke-width="1.5"/>
  <text x="505" y="483" text-anchor="middle" fill="#4caf50" font-size="12" font-weight="bold">SSH Server</text>
  <text x="505" y="499" text-anchor="middle" fill="#aaa" font-size="11">ssh.example.com</text>
  <text x="505" y="515" text-anchor="middle" fill="#aaa" font-size="11">Port 22</text>
  <text x="505" y="531" text-anchor="middle" fill="#888" font-size="10">forwards to db:5432</text>

  <!-- Arrow local -> SSH -->
  <line x1="295" y1="514" x2="373" y2="514" stroke="#00e5ff" stroke-width="2.5" stroke-dasharray="7,3"/>
  <polygon points="371,509 385,514 371,519" fill="#00e5ff"/>
  <text x="334" y="505" text-anchor="middle" fill="#00e5ff" font-size="10">② encrypted SSH tunnel</text>

  <!-- Remote Target -->
  <rect x="705" y="464" width="255" height="100" rx="8" fill="#3d1a1a" stroke="#ef5350" stroke-width="1.5"/>
  <text x="832" y="483" text-anchor="middle" fill="#ef5350" font-size="12" font-weight="bold">Remote DB Server</text>
  <text x="832" y="499" text-anchor="middle" fill="#aaa" font-size="11">192.168.1.50</text>
  <text x="832" y="515" text-anchor="middle" fill="#ffeb3b" font-size="12" font-weight="bold">:5432 (PostgreSQL)</text>
  <text x="832" y="531" text-anchor="middle" fill="#888" font-size="10">not directly reachable</text>

  <!-- Arrow SSH -> Target -->
  <line x1="625" y1="514" x2="693" y2="514" stroke="#ffeb3b" stroke-width="2"/>
  <polygon points="691,509 705,514 691,519" fill="#ffeb3b"/>
  <text x="659" y="505" text-anchor="middle" fill="#ffeb3b" font-size="10">③ network connection</text>

  <!-- ===================== CASE 3 : REMOTE ===================== -->
  <rect x="40" y="608" width="940" height="220" rx="10" fill="#13161f" stroke="#ff9800" stroke-width="1.5"/>
  <rect x="40" y="608" width="940" height="32" rx="10" fill="#2d1800"/>
  <rect x="40" y="626" width="940" height="14" fill="#2d1800"/>
  <text x="60" y="630" fill="#ff9800" font-size="15" font-weight="bold">③ REMOTE</text>
  <text x="160" y="630" fill="#555" font-size="13">— ssh -R [remote_port]:[local_target]:[local_port] user@server</text>
  <text x="800" y="630" fill="#e65100" font-size="12">Reverse Tunnel</text>

  <text x="60" y="659" fill="#888" font-size="12">The local machine initiates the SSH tunnel to the server. The server exposes a remote port that forwards back to a local service.</text>
  <text x="500" y="679" text-anchor="middle" fill="#777" font-size="11" font-style="italic">Example: expose a local web server (port 8080) reachable from the SSH server (port 9090)</text>

  <!-- Local Machine -->
  <rect x="55" y="690" width="240" height="110" rx="8" fill="#1e3a5f" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="175" y="709" text-anchor="middle" fill="#00e5ff" font-size="12" font-weight="bold">Local Machine</text>
  <text x="175" y="725" text-anchor="middle" fill="#aaa" font-size="11">127.0.0.1</text>
  <text x="175" y="741" text-anchor="middle" fill="#ffeb3b" font-size="12" font-weight="bold">:8080 (local web server)</text>
  <text x="175" y="757" text-anchor="middle" fill="#888" font-size="10">ssh -R 9090:localhost:8080 ...</text>
  <text x="175" y="773" text-anchor="middle" fill="#aaa" font-size="10">① initiates the SSH tunnel</text>

  <!-- SSH Server -->
  <rect x="385" y="690" width="240" height="110" rx="8" fill="#1a3d2b" stroke="#4caf50" stroke-width="1.5"/>
  <text x="505" y="709" text-anchor="middle" fill="#4caf50" font-size="12" font-weight="bold">SSH Server</text>
  <text x="505" y="725" text-anchor="middle" fill="#aaa" font-size="11">ssh.example.com</text>
  <text x="505" y="741" text-anchor="middle" fill="#ffeb3b" font-size="12" font-weight="bold">:9090 (exposed port)</text>
  <text x="505" y="757" text-anchor="middle" fill="#888" font-size="10">forwards to local:8080</text>
  <text x="505" y="773" text-anchor="middle" fill="#aaa" font-size="10">③ receives inbound connection</text>

  <!-- Arrow Local -> SSH Server -->
  <line x1="295" y1="745" x2="373" y2="745" stroke="#00e5ff" stroke-width="2.5" stroke-dasharray="7,3"/>
  <polygon points="371,740 385,745 371,750" fill="#00e5ff"/>
  <text x="334" y="736" text-anchor="middle" fill="#00e5ff" font-size="10">② encrypted SSH tunnel</text>

  <!-- Remote Client -->
  <rect x="705" y="690" width="255" height="110" rx="8" fill="#3d1a1a" stroke="#ef5350" stroke-width="1.5"/>
  <text x="832" y="709" text-anchor="middle" fill="#ef5350" font-size="12" font-weight="bold">Remote Client</text>
  <text x="832" y="725" text-anchor="middle" fill="#aaa" font-size="11">203.0.113.10</text>
  <text x="832" y="741" text-anchor="middle" fill="#ffeb3b" font-size="11" font-weight="bold">→ ssh.example.com:9090</text>
  <text x="832" y="757" text-anchor="middle" fill="#888" font-size="10">accesses the local service remotely</text>
  <text x="832" y="773" text-anchor="middle" fill="#888" font-size="10">④ connects to port 9090</text>

  <!-- Arrow Remote Client -> SSH Server (reverse flow) -->
  <line x1="635" y1="745" x2="704" y2="745" stroke="#ffeb3b" stroke-width="2"/>
  <polygon points="639,740 625,745 639,750" fill="#ffeb3b"/>
  <text x="664" y="736" text-anchor="middle" fill="#ffeb3b" font-size="10">④ inbound app flow</text>

  <!-- Warning note -->
  <text x="500" y="817" text-anchor="middle" fill="#ff9800" font-size="11">⚠ The SSH tunnel is always initiated by the LOCAL machine → the remote client consumes the service via the port exposed on the SSH server</text>

  <!-- Footer -->
  <line x1="40" y1="858" x2="960" y2="858" stroke="#333" stroke-width="1"/>
  <text x="500" y="872" text-anchor="middle" fill="#444" font-size="11">SSH Tunnels — Dynamic · Local · Remote</text>

</svg>
