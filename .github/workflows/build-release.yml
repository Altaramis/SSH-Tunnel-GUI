name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v5

      - name: Configurer Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Installer les dépendances système (Linux)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y patchelf libxcb-cursor0 libgl1

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade wheel setuptools
          pip install -r requirements.txt

      - name: Installer Nuitka (Windows / Linux)
        if: matrix.label != 'macos'
        run: pip install --upgrade nuitka

      - name: Installer PyInstaller (macOS — Nuitka ne supporte pas PyQt6 sur macOS)
        if: matrix.label == 'macos'
        run: pip install pyinstaller pillow

      - name: Injecter la version (Windows)
        if: matrix.label == 'windows'
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -notmatch '^v\d') {
            $version = "dev"
            $fileVersion = "0.0.0.0"
          } else {
            $version = $version.TrimStart('v')
            $numericVersion = $version -replace '-.*$', ''
            $parts = $numericVersion -split '\.'
            while ($parts.Count -lt 4) { $parts += "0" }
            $fileVersion = $parts[0..3] -join '.'
          }
          Set-Content -Path ssh_tunnel_gui/_version.py `
            -Value "# auto-generated by CI`n__version__ = '$version'"
          "VERSION=$version"          >> $env:GITHUB_ENV
          "FILE_VERSION=$fileVersion" >> $env:GITHUB_ENV

      - name: Injecter la version (Linux / macOS)
        if: matrix.label != 'windows'
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          [[ "$version" =~ ^v[0-9] ]] && version="${version#v}" || version="dev"
          printf "# auto-generated by CI\n__version__ = '%s'\n" "$version" \
            > ssh_tunnel_gui/_version.py
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Compiler avec Nuitka (Windows)
        if: matrix.label == 'windows'
        run: |
          python -m nuitka `
            --onefile `
            --onefile-no-compression `
            --remove-output `
            --standalone `
            --enable-plugin=pyqt6 `
            --windows-console-mode=disable `
            --windows-icon-from-ico=logo.ico `
            --include-data-files=logo.ico=logo.ico `
            --product-name="SSH Tunnel GUI" `
            --file-version="$env:FILE_VERSION" `
            --product-version="$env:FILE_VERSION" `
            --copyright="Copyright (C) 2026 Altaramis - GPL v3+" `
            --file-description="SSH Tunnel GUI" `
            --assume-yes-for-downloads `
            ./ssh_tunnel.py

      - name: Compiler avec Nuitka (Linux)
        if: matrix.label == 'linux'
        run: |
          python -m nuitka \
            --onefile \
            --onefile-no-compression \
            --remove-output \
            --standalone \
            --enable-plugin=pyqt6 \
            --linux-onefile-icon=logo.png \
            --include-data-files=logo.ico=logo.ico \
            --output-dir=dist \
            --output-filename=ssh_tunnel \
            --assume-yes-for-downloads \
            ./ssh_tunnel.py

      - name: Compiler avec PyInstaller (macOS)
        if: matrix.label == 'macos'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --icon=logo.ico \
            --add-data "logo.ico:." \
            --name ssh_tunnel \
            ./ssh_tunnel.py

      - name: Créer le zip de release (Windows)
        if: matrix.label == 'windows'
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -notmatch '^v\d') { $version = "dev" }
          Compress-Archive -Path ssh_tunnel.exe `
            -DestinationPath "ssh_tunnel_gui_${version}_windows.zip"

      - name: Créer le zip de release (Linux)
        if: matrix.label == 'linux'
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          [[ "$version" =~ ^v[0-9] ]] || version="dev"
          zip -j "ssh_tunnel_gui_${version}_linux.zip" dist/ssh_tunnel

      - name: Créer le zip de release (macOS)
        if: matrix.label == 'macos'
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          [[ "$version" =~ ^v[0-9] ]] || version="dev"
          zip -j "ssh_tunnel_gui_${version}_macos.zip" dist/ssh_tunnel

      - name: Ajouter l'exécutable à la Release
        uses: softprops/action-gh-release@v3
        with:
          files: ssh_tunnel_gui_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
