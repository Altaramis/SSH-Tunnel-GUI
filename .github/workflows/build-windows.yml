name: Build and Release Windows Executable

on:
  release:
    types: [published] # Se déclenche quand on créer une release
  workflow_dispatch: # Permet toujours de le lancer manuellement

jobs:
  build:
    runs-on: windows-latest
    # donne la permission à l'action d'ajouter des fichiers à la release
    permissions:
      contents: write

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade wheel setuptools nuitka
          pip install -r requirements.txt

      - name: Injecter la version
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -notmatch '^v\d') { $version = "dev" }
          Set-Content -Path ssh_tunnel_gui/_version.py `
            -Value "# auto-generated by CI`n__version__ = '$version'"

      - name: Compiler avec Nuitka
        run: |
          python -m nuitka `
            --onefile `
            --onefile-no-compression `
            --remove-output `
            --standalone `
            --enable-plugin=pyqt6 `
            --windows-console-mode=disable `
            --windows-icon-from-ico=logo.ico `
            --include-data-files=logo.ico=logo.ico `
            --assume-yes-for-downloads `
            ./ssh_tunnel.py

      - name: Créer le zip de release
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -notmatch '^v\d') { $version = "dev" }
          Compress-Archive -Path ssh_tunnel.exe `
            -DestinationPath "ssh_tunnel_gui_${version}.zip"

      - name: Ajouter l'exécutable à la Release
        uses: softprops/action-gh-release@v2
        with:
          files: ssh_tunnel_gui_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
